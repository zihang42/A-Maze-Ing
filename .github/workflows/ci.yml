name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"
                  enable-cache: true

            - name: Install dependencies
              run: uv sync

            - name: Check flake8
              run: uv run flake8 --exclude=.venv,tests/output_validator.py .

            - name: Check mypy
              run: uv run mypy --exclude '(\.venv|tests)' .

            - name: Run pytest
              run: uv run pytest
